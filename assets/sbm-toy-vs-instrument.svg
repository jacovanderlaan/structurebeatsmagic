<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="toyCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1414"/><stop offset="1" stop-color="#1f0f0f"/>
    </linearGradient>
    <linearGradient id="instCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/><stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="92" text-anchor="middle" font-size="56" font-weight="800" fill="#f8fafc">Toy or instrument?</text>
  <text x="800" y="138" text-anchor="middle" font-size="25" fill="#94a3b8">Same model. The structure around it decides which one you get.</text>
  <rect x="660" y="158" width="280" height="4" rx="2" fill="#38bdf8"/>

  <!-- LEFT: the magic box (toy) -->
  <rect x="90" y="230" width="640" height="540" rx="24" fill="url(#toyCard)" stroke="#7f1d1d" stroke-width="2.5" filter="url(#soft)"/>
  <text x="410" y="300" text-anchor="middle" font-size="34" font-weight="800" fill="#fca5a5">The magic box</text>
  <text x="410" y="334" text-anchor="middle" font-size="18" fill="#ef9a9a" font-style="italic">type something clever, something impressive comes out</text>
  <line x1="150" y1="362" x2="670" y2="362" stroke="#7f1d1d" stroke-width="1.5"/>

  <g font-size="22" fill="#fecaca">
    <text x="150" y="424">✗  Impressive in the demo</text>
    <text x="150" y="476">✗  Unreliable in real work</text>
    <text x="150" y="528">✗  Forgets everything tomorrow</text>
    <text x="150" y="580">✗  Good output is luck</text>
    <text x="150" y="632">✗  Can't explain how it got there</text>
  </g>
  <rect x="150" y="678" width="520" height="56" rx="12" fill="#1f0f0f" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="410" y="714" text-anchor="middle" font-size="22" font-weight="700" fill="#fca5a5">= a toy</text>

  <!-- RIGHT: the instrument -->
  <rect x="870" y="230" width="640" height="540" rx="24" fill="url(#instCard)" stroke="#38bdf8" stroke-width="3" filter="url(#soft)"/>
  <text x="1190" y="300" text-anchor="middle" font-size="34" font-weight="800" fill="#7dd3fc">The instrument</text>
  <text x="1190" y="334" text-anchor="middle" font-size="18" fill="#67b8e0" font-style="italic">structure, memory, rules and data around the model</text>
  <line x1="930" y1="362" x2="1450" y2="362" stroke="#38bdf8" stroke-width="1.5"/>

  <g font-size="22" fill="#e0f2fe">
    <text x="930" y="424">✓  Context it can see</text>
    <text x="930" y="476">✓  Memory it carries across sessions</text>
    <text x="930" y="528">✓  Rules that encode your standards</text>
    <text x="930" y="580">✓  Good output becomes repeatable</text>
    <text x="930" y="632">✓  Reliable, governed, explainable</text>
  </g>
  <rect x="930" y="678" width="520" height="56" rx="12" fill="#0d2638" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="1190" y="714" text-anchor="middle" font-size="22" font-weight="700" fill="#7dd3fc">= an instrument</text>

  <!-- center divider -->
  <text x="800" y="510" text-anchor="middle" font-size="40" fill="#475569" font-weight="800">vs</text>

  <!-- Bottom signature line -->
  <rect x="240" y="806" width="1120" height="62" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="800" y="846" text-anchor="middle" font-size="24" fill="#e2e8f0">
    <tspan fill="#f8fafc" font-weight="800">Structure</tspan><tspan fill="#94a3b8"> beats </tspan><tspan fill="#fde68a" font-weight="800">magic</tspan><tspan fill="#94a3b8"> · structurebeatsmagic.com</tspan>
  </text>
</svg>
