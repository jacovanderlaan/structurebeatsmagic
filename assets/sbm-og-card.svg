<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- accent corner bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#38bdf8"/>

  <!-- subtle structural grid, left -->
  <g opacity="0.14" stroke="#38bdf8" stroke-width="1.2">
    <line x1="80" y1="200" x2="80" y2="430"/><line x1="150" y1="200" x2="150" y2="430"/>
    <line x1="220" y1="200" x2="220" y2="430"/>
    <line x1="80" y1="200" x2="220" y2="200"/><line x1="80" y1="270" x2="220" y2="270"/>
    <line x1="80" y1="340" x2="220" y2="340"/><line x1="80" y1="410" x2="220" y2="410"/>
  </g>

  <!-- Statement -->
  <text x="600" y="248" text-anchor="middle" font-size="92" font-weight="800" fill="#f8fafc">Structure</text>
  <text x="600" y="330" text-anchor="middle" font-size="56" font-weight="700" fill="#94a3b8">beats</text>
  <text x="600" y="430" text-anchor="middle" font-size="92" font-weight="800" fill="url(#goldText)" filter="url(#glow)">magic</text>
  <rect x="500" y="452" width="200" height="4" rx="2" fill="#38bdf8"/>

  <!-- formula strip -->
  <text x="600" y="520" text-anchor="middle" font-size="26" fill="#cbd5e1">
    <tspan fill="#94a3b8">Structure + Data + AI + </tspan><tspan fill="#7dd3fc" font-weight="800">Rules</tspan><tspan fill="#94a3b8"> → </tspan><tspan fill="#fde68a" font-weight="800">Intelligence</tspan>
  </text>

  <!-- footer -->
  <text x="600" y="582" text-anchor="middle" font-size="20" fill="#64748b">Jaco van der Laan · structurebeatsmagic.com</text>
</svg>
