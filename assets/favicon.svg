<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- rounded dark tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- structure stacking up to the payoff: a broad base, a middle, and a gold cap.
       Reads as "blocks build into a system" — the SBM thesis, not a generic grid. -->
  <!-- base row (widest, the foundation) -->
  <rect x="13" y="41" width="12" height="10" rx="2.5" fill="#2563eb"/>
  <rect x="27" y="41" width="12" height="10" rx="2.5" fill="#1e3a8a"/>
  <rect x="41" y="41" width="10" height="10" rx="2.5" fill="#2563eb"/>
  <!-- middle row (narrower, offset in) -->
  <rect x="20" y="29" width="12" height="10" rx="2.5" fill="#1e3a8a"/>
  <rect x="34" y="29" width="12" height="10" rx="2.5" fill="#2563eb"/>
  <!-- top: the single gold block = the payoff, structure resolved to a system -->
  <rect x="27" y="17" width="12" height="10" rx="2.5" fill="#b88a1b"/>
</svg>
