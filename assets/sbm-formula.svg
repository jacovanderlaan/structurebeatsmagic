<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2a3a"/><stop offset="1" stop-color="#0b2230"/>
    </linearGradient>
    <linearGradient id="rulesCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/><stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <linearGradient id="goldCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f12"/><stop offset="1" stop-color="#2a2210"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="120" text-anchor="middle" font-size="58" font-weight="800" fill="#f8fafc">The formula</text>
  <text x="800" y="166" text-anchor="middle" font-size="25" fill="#94a3b8">Everyone says data + AI. The missing word — the one that makes it reliable — is <tspan fill="#7dd3fc" font-weight="700">rules</tspan>.</text>
  <rect x="690" y="188" width="220" height="4" rx="2" fill="#38bdf8"/>

  <!-- Four pills in a row -->
  <!-- Structure -->
  <rect x="70" y="320" width="280" height="150" rx="18" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="210" y="392" text-anchor="middle" font-size="32" font-weight="800" fill="#38bdf8">Structure</text>
  <text x="210" y="430" text-anchor="middle" font-size="17" fill="#9fc7e0">the ordered system</text>
  <!-- Data -->
  <rect x="430" y="320" width="240" height="150" rx="18" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="550" y="392" text-anchor="middle" font-size="32" font-weight="800" fill="#38bdf8">Data</text>
  <text x="550" y="430" text-anchor="middle" font-size="17" fill="#9fc7e0">your own sources</text>
  <!-- AI -->
  <rect x="750" y="320" width="220" height="150" rx="18" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="860" y="392" text-anchor="middle" font-size="32" font-weight="800" fill="#38bdf8">AI</text>
  <text x="860" y="430" text-anchor="middle" font-size="17" fill="#9fc7e0">the reasoning layer</text>
  <!-- Rules (wedge) -->
  <rect x="1050" y="304" width="290" height="182" rx="18" fill="url(#rulesCard)" stroke="#38bdf8" stroke-width="3.5" filter="url(#soft)"/>
  <text x="1195" y="372" text-anchor="middle" font-size="32" font-weight="800" fill="#7dd3fc">Rules</text>
  <text x="1195" y="402" text-anchor="middle" font-size="15" fill="#38bdf8" font-weight="700">◆ THE WEDGE ◆</text>
  <text x="1195" y="442" text-anchor="middle" font-size="17" fill="#e0f2fe">classify · validate · decide</text>

  <!-- plus signs -->
  <text x="392" y="408" text-anchor="middle" font-size="38" fill="#64748b" font-weight="700">+</text>
  <text x="712" y="408" text-anchor="middle" font-size="38" fill="#64748b" font-weight="700">+</text>
  <text x="1012" y="408" text-anchor="middle" font-size="38" fill="#64748b" font-weight="700">+</text>

  <!-- big arrow -->
  <text x="800" y="568" text-anchor="middle" font-size="46" fill="#38bdf8" font-weight="800">↓</text>

  <!-- Intelligence -->
  <rect x="470" y="596" width="660" height="128" rx="20" fill="url(#goldCard)" stroke="#eab308" stroke-width="2.5" filter="url(#soft)"/>
  <text x="800" y="652" text-anchor="middle" font-size="40" font-weight="800" fill="#fde68a">Intelligence</text>
  <text x="800" y="692" text-anchor="middle" font-size="19" fill="#d6c79a">reliable · governed · explainable — insight you act on</text>

  <!-- signature -->
  <rect x="240" y="792" width="1120" height="62" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="800" y="832" text-anchor="middle" font-size="24" fill="#e2e8f0">
    <tspan fill="#94a3b8">Structure + Data + AI + </tspan><tspan fill="#7dd3fc" font-weight="800">Rules</tspan><tspan fill="#94a3b8"> → </tspan><tspan fill="#fde68a" font-weight="800">Intelligence</tspan><tspan fill="#475569"> · structurebeatsmagic.com</tspan>
  </text>
</svg>
